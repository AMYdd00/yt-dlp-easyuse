<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YT-DLP 录播监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1120;--surface:rgba(18,25,45,0.7);--border:rgba(56,189,248,0.1);--text:#e2e8f0;--text-dim:#64748b;--accent:#38bdf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--card-bg:rgba(15,23,42,0.6);--log-bg:rgba(0,0,0,0.4);--log-text:#4ade80;--radius:12px}
[data-theme="light"]{--bg:#f1f5f9;--surface:rgba(255,255,255,0.8);--border:rgba(0,0,0,0.08);--text:#0f172a;--text-dim:#64748b;--accent:#2563eb;--green:#059669;--red:#dc2626;--yellow:#d97706;--card-bg:rgba(255,255,255,0.7);--log-bg:rgba(226,232,240,0.8);--log-text:#059669}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;min-height:100vh;display:flex;transition:background .3s}
.sidebar{width:320px;flex-shrink:0;padding:24px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:16px;height:100vh;position:sticky;top:0}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.theme-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;transition:.2s}
.theme-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.section-title{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;backdrop-filter:blur(12px)}
.card input{width:100%;background:rgba(0,0,0,0.2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;outline:none;font-size:13px;transition:.2s;margin-bottom:10px}
[data-theme="light"] .card input{background:rgba(0,0,0,0.03)}
.card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,0.15)}
.card input::placeholder{color:var(--text-dim)}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.85}.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-accent{background:var(--green);color:#0b1120}.btn-accent:hover{opacity:.85}
.manual-msg{font-size:12px;margin-top:10px;color:var(--accent);display:none}
.main{flex:1;padding:32px;overflow-y:auto}
.main-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.main-header h2{font-size:22px;font-weight:700}
.badge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.badge-ok{background:rgba(74,222,128,.1);color:var(--green);border:1px solid var(--green)}
.badge-warn{background:rgba(251,191,36,.1);color:var(--yellow);border:1px solid var(--yellow)}
.badge-err{background:rgba(248,113,113,.1);color:var(--red);border:1px solid var(--red)}
.badge-count{background:var(--surface);color:var(--text-dim);border:1px solid var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
.channel-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:.3s}
.channel-card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(0,0,0,.2)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.channel-name{font-size:15px;font-weight:600;word-break:break-all;flex:1;margin-right:10px}
.del-btn{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.15);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:.2s;flex-shrink:0}
.del-btn:hover{background:var(--red);color:#fff}.del-btn.confirming{background:var(--red);color:#fff}
.status{font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.green{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.4)}
.status-dot.yellow{background:var(--yellow);box-shadow:0 0 8px rgba(251,191,36,.4)}
.status-dot.gray{background:var(--text-dim)}
.progress{height:4px;background:rgba(0,0,0,.15);border-radius:2px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:2px;transition:width .5s ease;width:0%}
.last-time{font-size:11px;color:var(--text-dim);margin:4px 0;padding-left:2px}
.log-box{background:var(--log-bg);color:var(--log-text);font-family:Consolas,monospace;font-size:11px;padding:12px;height:80px;overflow-y:auto;border-radius:8px;line-height:1.6;border:1px solid var(--border);white-space:pre-wrap;word-break:break-all}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;backdrop-filter:blur(8px);max-width:360px;animation:slideIn .3s ease}
.toast-info{background:rgba(56,189,248,.85)}
.toast-success{background:rgba(74,222,128,.85);color:#0b1120}
.toast-warn{background:rgba(251,191,36,.85);color:#0b1120}
.toast-error{background:rgba(248,113,113,.85)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="sidebar">
<div class="sidebar-header"><h1>YT-DLP 监控</h1><button class="theme-btn" onclick="toggleTheme()" id="themeIcon">☀️ 日间</button></div>
<div><div class="section-title">添加频道</div><div class="card"><input type="text" id="urlInp" placeholder="频道 /streams 链接" autocomplete="off"><button class="btn btn-primary" id="addBtn" onclick="addUrl()">添加到监控</button></div></div>
<div style="flex:1"></div>
<div><div class="section-title">手动下载</div><div class="card"><input type="text" id="manualUrl" placeholder="单个视频链接" autocomplete="off"><button class="btn btn-accent" id="manualBtn" onclick="sendManual()">开始下载</button><div class="manual-msg" id="manualMsg"></div></div></div>
</div>
<div class="main">
<div class="main-header"><h2>频道列表</h2><span class="badge badge-ok" id="engineBadge">运行正常</span><span class="badge badge-count" id="countBadge"></span></div>
<div class="grid" id="cards"><div id="loading-placeholder" style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-dim)"><div style="font-size:32px;margin-bottom:12px">📡</div><div>正在连接服务端...</div></div></div>
</div>
<div id="man-section" style="margin-top:30px;display:none"><div class="main-header"><h3>⬇️ 手动下载</h3></div><div class="grid" id="man-cards"></div></div>
<script>
// ===== 工具函数 =====
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function safeId(s){return btoa(encodeURIComponent(s)).replace(/=/g,"")}
function nameFromUrl(url){var m=url.match(/@([^\/?]+)/);if(m)try{return decodeURIComponent(m[1])}catch(e){}try{return decodeURIComponent(url.split("/").filter(Boolean).pop()||"?")}catch(e){}return"?"}
function toast(msg,type,dur){type=type||"info";dur=dur||4000;var c=document.getElementById("toastContainer");var el=document.createElement("div");el.className="toast toast-"+type;el.textContent=msg;c.appendChild(el);setTimeout(function(){el.style.animation="slideIn .3s ease reverse forwards";setTimeout(function(){el.remove()},300)},dur)}
function toggleTheme(){var r=document.documentElement;var t=r.getAttribute("data-theme")==="light"?"dark":"light";r.setAttribute("data-theme",t);localStorage.setItem("theme",t);document.getElementById("themeIcon").textContent=t==="light"?"🌙 夜间":"☀️ 日间"}
if(localStorage.getItem("theme")==="light"){document.documentElement.setAttribute("data-theme","light");document.getElementById("themeIcon").textContent="🌙 夜间"}

// ===== 事件委托：删除按钮 =====
var delTimers={};
document.getElementById("cards").addEventListener("click",function(e){
  var btn=e.target.closest(".del-btn");
  if(!btn)return;
  var url=btn.getAttribute("data-url");
  var id=btn.id;
  if(btn.classList.contains("confirming")){
    clearTimeout(delTimers[id]);
    executeDel(url);
    return;
  }
  btn.classList.add("confirming");
  btn.textContent="确认移除?";
  delTimers[id]=setTimeout(function(){
    btn.classList.remove("confirming");
    btn.textContent="移除";
  },3000);
});
document.getElementById("cards").addEventListener("mouseleave",function(){
  var btns=document.querySelectorAll(".del-btn.confirming");
  for(var i=0;i<btns.length;i++){
    clearTimeout(delTimers[btns[i].id]);
    btns[i].classList.remove("confirming");
    btns[i].textContent="移除";
  }
});

async function executeDel(url){
  try{
    var cur=await fetch("/api/list").then(function(r){return r.json()});
    var next=cur.filter(function(u){return u!==url});
    await fetch("/api/update_list",{method:"POST",body:JSON.stringify(next)});
    toast("已移除","success");
    update();
  }catch(e){toast("删除失败","error")}
}

// ===== 核心更新 =====
var failCount=0;
async function update(){
  try{
    var resp=await Promise.all([
      fetch("/api/list").then(function(r){return r.json()}),
      fetch("/api/status").then(function(r){return r.json()})
    ]);
    var list=resp[0];
    var status=resp[1];
    failCount=0;
    document.getElementById("engineBadge").className="badge badge-ok";
    document.getElementById("engineBadge").textContent="运行正常";

    var smap={};
    for(var i=0;i<status.length;i++){smap[decodeURIComponent(status[i].id)]=status[i]}

    var container=document.getElementById("cards");
    var ids=list.map(function(u){return safeId(u)});
    for(var i=container.children.length-1;i>=0;i--){
      var c=container.children[i];
      if(c.id==="loading-placeholder"){c.remove();continue}
      if(c.id.startsWith("card-")&&ids.indexOf(c.id.replace("card-",""))===-1){c.remove()}
    }
    var ce=document.getElementById("countBadge");
    if(list.length>0){ce.style.display="inline-block";ce.textContent=list.length+" 个频道"}
    else{ce.style.display="none"}

    for(var i=0;i<list.length;i++){
      var u=list[i];
      var sid=ids[i];
      var name=nameFromUrl(u);
      var as=smap[name];
      if(document.getElementById("card-"+sid)){updateCard(sid,as);continue}
      var div=document.createElement("div");
      div.className="channel-card";
      div.id="card-"+sid;
      div.innerHTML='<div class="card-top"><span class="channel-name" title="'+esc(u)+'">'+esc(name)+'</span><button class="del-btn" id="del-'+sid+'" data-url="'+esc(u)+'">移除</button></div><div class="status" id="st-'+sid+'"><span class="status-dot gray"></span> 等待中</div><div class="last-time" id="lt-'+sid+'"></div><div class="progress"><div class="progress-fill" id="bar-'+sid+'"></div></div><div class="log-box" id="log-'+sid+'">正在加载...</div>';
      container.appendChild(div);
      updateCard(sid,as);
    }
  }catch(e){
    failCount++;
    var badge=document.getElementById("engineBadge");
    if(failCount>=3){badge.className="badge badge-warn";badge.textContent="连接异常 ("+failCount+"次)"}
    if(failCount>=6){badge.className="badge badge-err";badge.textContent="无法连接";toast("服务端连接失败","error",8000)}
  }
}

function updateCard(sid,as){
  var st=document.getElementById("st-"+sid);
  var bar=document.getElementById("bar-"+sid);
  var log=document.getElementById("log-"+sid);
  var lt=document.getElementById("lt-"+sid);
  if(as){
    if(as.status.indexOf("\u274c")!==-1){st.innerHTML='<span class="status-dot" style="background:var(--red);box-shadow:0 0 8px rgba(248,113,113,.4)"></span> '+esc(as.status)}
    else if(as.status.indexOf("\u4e0b\u8f7d")!==-1){st.innerHTML='<span class="status-dot green"></span> '+esc(as.status)}
    else{st.innerHTML='<span class="status-dot yellow"></span> '+esc(as.status)}
    var pm=as.raw.match(/(\d+\.?\d*)%/);
    bar.style.width=pm?pm[1]+"%":"100%";
    if(lt){lt.textContent=as.last_download?"\u6700\u540e\u4e0b\u8f7d: "+as.last_download:""}
    fetch("/api/log/"+as.id).then(function(r){return r.text()}).then(function(t){if(log.textContent!==t){log.textContent=t;log.scrollTop=log.scrollHeight}}).catch(function(){});
  }else{
    st.innerHTML='<span class="status-dot gray"></span> 等待中';
    bar.style.width="0%";
    log.textContent="暂无直播录像";
  }
}

// ===== 操作 =====
async function addUrl(){
  var inp=document.getElementById("urlInp");
  var btn=document.getElementById("addBtn");
  var url=inp.value.trim();
  if(!url)return;
  if(url.endsWith("/live")){toast("请使用 /streams 链接","warn");return}
  btn.disabled=true;btn.textContent="添加中...";
  try{
    var cur=await fetch("/api/list").then(function(r){return r.json()});
    if(cur.indexOf(url)===-1){cur.push(url);await fetch("/api/update_list",{method:"POST",body:JSON.stringify(cur)});toast("已添加","success")}
    else{toast("已在列表中","warn")}
    inp.value="";update();
  }catch(e){toast("添加失败","error")}
  finally{btn.disabled=false;btn.textContent="添加到监控"}
}

async function sendManual(){
  var inp=document.getElementById("manualUrl");
  var btn=document.getElementById("manualBtn");
  var msg=document.getElementById("manualMsg");
  var url=inp.value.trim();
  if(!url)return;
  btn.disabled=true;msg.style.display="block";msg.textContent="正在提交...";msg.style.color="var(--accent)";
  try{
    var r=await fetch("/api/manual_download",{method:"POST",body:JSON.stringify({url:url})});
    var d=await r.json();
    if(d.error){msg.textContent="失败";msg.style.color="var(--red)";toast("下载失败","error")}
    else{msg.textContent="已开始下载";msg.style.color="var(--green)";toast("已启动","success");inp.value=""}
  }catch(e){msg.textContent="提交失败";msg.style.color="var(--red)";toast("提交失败","error")}
  finally{btn.disabled=false}
}

// ===== 键盘快捷键 =====
document.getElementById("urlInp").addEventListener("keydown",function(e){if(e.key==="Enter"){addUrl()}})
document.getElementById("manualUrl").addEventListener("keydown",function(e){if(e.key==="Enter"){sendManual()}})

// ===== 手动下载管理 =====
var killPending={};
var manCollapsed = false;
function killManual(btn){
  var name=btn.getAttribute("data-name");
  if(!name||killPending[name])return;
  if(!btn.classList.contains("confirming")){
    btn.classList.add("confirming");
    btn.textContent="确认终止?";
    var tid=setTimeout(function(){btn.classList.remove("confirming");btn.textContent="终止并清除";},3000);
    btn._confirmTimer=tid;
    return;
  }
  clearTimeout(btn._confirmTimer);
  killPending[name]=true;
  btn.disabled=true;
  btn.textContent="终止中...";
    fetch("/api/clear_manual",{method:"POST",body:JSON.stringify({name:name})})
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.status==="ok"){toast("已清除: "+name,"success")}
      else{toast(d.error||"失败","error")}
    })
    .catch(function(){toast("请求失败","error")})
    .finally(function(){
      delete killPending[name];
      var card=btn.closest(".channel-card");
      if(card)card.remove();
      var mc=document.getElementById("man-cards");
      if(mc&&mc.children.length===0){
        document.getElementById("man-section").style.display="none";
      }
    });
}

function manUpdate(){
  var e=document.getElementById('man-cards');
  var s=document.getElementById('man-section');
  if(!e||!s)return;
  fetch('/api/status').then(function(r){return r.json()}).then(function(l){
    var m=l.filter(function(x){return x.id.indexOf('manual_')===0||x.proc_type==='manual'});
    if(!m.length){s.style.display='none';manCollapsed=false;return}
    if(!manCollapsed){s.style.display=''}
    e.innerHTML='';
    for(var i=0;i<m.length;i++){
      var v=m[i];
      var url=v.proc_url||v.url||v.id;
      var d=document.createElement('div');
      d.className='channel-card';
      d.id='mancard-'+i;
      var percent='';
      var pm=v.raw&&v.raw.match(/(\d+\.?\d*)%/);
      if(pm){percent='<div class="progress"><div class="progress-fill" style="width:'+pm[1]+'%"></div></div>'}
      d.innerHTML='<div class="card-top"><span class="channel-name" title="'+esc(v.raw||'')+'">'+esc((url||'').substring(0,80))+'</span><button class="del-btn" data-name="'+esc(v.id)+'" onclick="killManual(this)">终止并清除</button></div><div class="status"><span class="status-dot green"></span> '+esc(v.status)+'</div>'+percent+'<div class="log-box" style="height:60px">'+esc(v.raw)+'</div>';
      e.appendChild(d)
    }
  }).catch(function(){})
}

// ===== 启动 =====
update();
setInterval(update,5000);
setInterval(manUpdate,3000);
manUpdate();
</script>
</body>
</html>
