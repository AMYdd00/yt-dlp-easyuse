<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>YT-DLP 智能录播矩阵</title>
    <style>
        :root { 
            --bg-grad-1: #0f172a; --bg-grad-2: #1e1b4b; --bg-grad-3: #0f172a;
            --glass-bg: rgba(22, 27, 34, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.3);
            --text-main: #f8fafc; --text-sub: #94a3b8;
            --accent: #00f2ff; --accent-glow: rgba(0, 242, 255, 0.4);
            --danger: #ef4444; --danger-hover: #b91c1c;
            --log-bg: rgba(0, 0, 0, 0.5); --log-text: #4ade80;
            --btn-bg: #3b82f6; --btn-hover: #2563eb;
        }

        [data-theme="light"] {
            --bg-grad-1: #e2e8f0; --bg-grad-2: #f8fafc; --bg-grad-3: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a; --text-sub: #475569;
            --accent: #2563eb; --accent-glow: rgba(37, 99, 235, 0.3);
            --danger: #ef4444; --danger-hover: #dc2626;
            --log-bg: rgba(241, 245, 249, 0.8); --log-text: #059669;
            --btn-bg: #3b82f6; --btn-hover: #2563eb;
        }

        body { 
            margin: 0; color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; height: 100vh; overflow: hidden;
            background: linear-gradient(-45deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: all 0.5s ease;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: 0 8px 32px var(--glass-shadow); }

        .sidebar { width: 340px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 10; border-right: 1px solid var(--glass-border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header-top h3 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .theme-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .theme-btn:hover { background: var(--text-main); color: var(--bg-grad-1); }

        .control-panel { padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .control-panel h4 { margin: 0 0 10px 0; color: var(--text-main); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        input { width: 100%; background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; outline: none; transition: 0.3s; font-size: 13px; }
        [data-theme="light"] input { background: rgba(255,255,255,0.5); }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        button.primary { background: var(--btn-bg); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button.primary:hover { background: var(--btn-hover); }

        .main { flex: 1; padding: 30px; overflow-y: auto; }
        #cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }

        .card { border-radius: 16px; padding: 20px; transition: all 0.3s ease; position: relative; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 15px 35px var(--glass-shadow); border-color: var(--accent); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .name { font-size: 1.15rem; font-weight: bold; color: var(--text-main); word-break: break-all; margin-right: 10px;}
        
        /* 移除按钮动画 */
        .del-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 12px; flex-shrink: 0; min-width: 60px; }
        .del-btn:hover { background: var(--danger); color: #fff; }

        .status-txt { font-size: 13px; color: var(--accent); font-weight: 500; margin-bottom: 12px; }
        .status-standby { color: var(--text-sub); }

        .prog-bg { background: rgba(0,0,0,0.2); height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 15px; }
        [data-theme="light"] .prog-bg { background: rgba(0,0,0,0.05); }
        .prog-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--accent-glow); }

        .log-box { background: var(--log-bg); color: var(--log-text); font-family: 'Consolas', monospace; font-size: 11px; padding: 12px; height: 90px; overflow-y: auto; border-radius: 8px; line-height: 1.5; border: 1px solid var(--glass-border); scroll-behavior: smooth; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }
    </style>
</head>
<body>
    <div class="sidebar glass">
        <div class="header-top">
            <h3>🛸 监控指挥舱</h3>
            <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">☀️ 白天</button>
        </div>
        
        <div class="control-panel glass">
            <h4>➕ 添加自动监控</h4>
            <input type="text" id="urlInp" placeholder="格式: https://.../streams (切勿填/live)" autocomplete="off">
            <button class="primary" onclick="addUrl()">加入监控队列</button>
        </div>

        <div class="control-panel glass" style="margin-top: auto;">
            <h4>🚀 强制单次补录</h4>
            <input type="text" id="manualUrl" placeholder="粘贴丢失录像的 URL..." autocomplete="off">
            <button class="primary" onclick="sendManual()" style="background: var(--accent); color:#000;">执行强制下载</button>
            <div id="manualMsg" style="font-size: 12px; margin-top: 10px; color: var(--accent); display: none;"></div>
        </div>
    </div>

    <div class="main">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <h2 style="margin:0; font-size: 1.8rem; color: var(--text-main);">矩阵全览</h2>
            <span style="font-size: 12px; background: rgba(74, 222, 128, 0.15); color: #4ade80; padding: 4px 10px; border-radius: 12px; border: 1px solid #4ade80;">引擎运转中</span>
        </div>
        <div id="cards"></div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeIcon').innerText = newTheme === 'light' ? '🌙 夜间' : '☀️ 白天';
        }
        if(localStorage.getItem('theme') === 'light') { toggleTheme(); }

        // --- 防误删：二次确认核心逻辑 ---
        let delTimers = {};
        function safeDel(url, btnId) {
            const btn = document.getElementById(btnId);
            if (btn.dataset.confirm !== "true") {
                // 第一次点击：请求确认
                btn.dataset.confirm = "true";
                btn.innerHTML = "⚠️ 确认删除?";
                btn.style.background = "var(--danger)";
                btn.style.color = "#fff";
                // 3秒后自动复原
                delTimers[btnId] = setTimeout(() => resetDel(btnId), 3000);
            } else {
                // 第二次点击：执行删除
                clearTimeout(delTimers[btnId]);
                executeDel(url);
            }
        }

        function resetDel(btnId) {
            const btn = document.getElementById(btnId);
            if(btn && btn.dataset.confirm === "true") {
                btn.dataset.confirm = "false";
                btn.innerHTML = "🗑️ 移除";
                btn.style.background = "";
                btn.style.color = "";
            }
        }

        async function executeDel(url) {
            const cur = await fetch('/api/list').then(r => r.json());
            const newList = cur.filter(u => u !== url);
            await fetch('/api/update_list', { method: 'POST', body: JSON.stringify(newList) });
            update();
        }

        async function update() {
            try {
                const [list, status] = await Promise.all([
                    fetch('/api/list').then(r => r.json()),
                    fetch('/api/status').then(r => r.json())
                ]);

                const statusMap = {};
                for(let s of status) {
                    statusMap[decodeURIComponent(s.id)] = s;
                }

                const container = document.getElementById('cards');
                const currentSafeIds = list.map(u => btoa(encodeURIComponent(u)).replace(/=/g, ''));

                Array.from(container.children).forEach(c => {
                    if (!currentSafeIds.includes(c.id.replace('card-', ''))) c.remove();
                });

                for (let i = 0; i < list.length; i++) {
                    let u = list[i];
                    let safeId = currentSafeIds[i];
                    
                    let rawName = u.includes('@') ? u.match(/@([^\/\?]+)/)?.[1] : u.split('/').filter(Boolean).pop();
                    let name = rawName ? decodeURIComponent(rawName) : "未知频道";
                    
                    let activeStatus = statusMap[name]; 

                    let card = document.getElementById(`card-${safeId}`);
                    if (!card) {
                        // 绑定了全新的 safeDel 和 resetDel 函数
                        container.insertAdjacentHTML('beforeend', `
                            <div class="card glass" id="card-${safeId}">
                                <div class="card-header">
                                    <span class="name" title="${u}">${name}</span>
                                    <button class="del-btn" id="del-${safeId}" 
                                        onclick="safeDel('${u}', 'del-${safeId}')" 
                                        onmouseleave="resetDel('del-${safeId}')">🗑️ 移除</button>
                                </div>
                                <div class="status-txt" id="txt-${safeId}">读取中...</div>
                                <div class="prog-bg"><div class="prog-fill" id="bar-${safeId}"></div></div>
                                <div class="log-box" id="log-${safeId}">正在连接终端...</div>
                            </div>`);
                        card = document.getElementById(`card-${safeId}`);
                    }

                    const txtDiv = document.getElementById(`txt-${safeId}`);
                    const barDiv = document.getElementById(`bar-${safeId}`);
                    const logDiv = document.getElementById(`log-${safeId}`);

                    if (activeStatus) {
                        txtDiv.innerText = activeStatus.status;
                        txtDiv.className = "status-txt";
                        
                        const pMatch = activeStatus.raw.match(/(\d+\.?\d*)%/);
                        barDiv.style.width = pMatch ? pMatch[1] + '%' : '100%';

                        // ⚠️ 修复点：移除了 encodeURIComponent，解决双重编码导致的读取失败
                        const logTxt = await fetch('/api/log/' + activeStatus.id).then(r => r.text());
                        if (logDiv.innerText !== logTxt) {
                            logDiv.innerText = logTxt;
                            logDiv.scrollTop = logDiv.scrollHeight;
                        }
                    } else {
                        txtDiv.innerText = "⏳ 待机扫描中 (暂无有效直播)";
                        txtDiv.className = "status-txt status-standby";
                        barDiv.style.width = '0%';
                        logDiv.innerText = "[系统提示] 该频道当前没有产生新的流媒体切片数据。\n程序将在后台持续监听，一旦检测到直播结束将立即触发防截断录制协议...";
                    }
                }
            } catch (e) {}
        }

        async function addUrl() {
            const inp = document.getElementById('urlInp'); 
            const url = inp.value.trim();
            if(!url) return;
            if(url.endsWith('/live')) {
                alert("⚠️ 请注意：监控列表应使用 /streams 结尾，/live 无法正确抓取 VOD 回放！");
                return;
            }

            const cur = await fetch('/api/list').then(r => r.json());
            if(!cur.includes(url)) {
                cur.push(url);
                await fetch('/api/update_list', { method: 'POST', body: JSON.stringify(cur) });
            }
            inp.value = ''; update();
        }

        async function sendManual() {
            const inp = document.getElementById('manualUrl');
            const msg = document.getElementById('manualMsg');
            if(!inp.value.trim()) return;

            msg.style.display = 'block';
            msg.innerText = "⏳ 补录指令已下发后端...";
            
            try {
                await fetch('/api/manual_download', { 
                    method: 'POST', body: JSON.stringify({ url: inp.value.trim() }) 
                });
                setTimeout(() => { 
                    msg.style.color = '#4ade80';
                    msg.innerText = "✅ 任务执行中！(请查看 Manual 文件夹)"; 
                    inp.value = '';
                }, 1000);
            } catch(e) {
                msg.style.color = 'var(--danger)';
                msg.innerText = "❌ 提交失败，请检查 Python 服务端";
            }
        }

        setInterval(update, 3000); 
        update();
    </script>
</body>
</html>
